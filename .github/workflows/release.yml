name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release package
        run: |
          tar -czvf cc-flytrap.tar.gz cc-flytrap cc-flytrap.py NOTICE README.md bin/ ledger.py systemd/
          
      - name: Create GitHub Release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            cc-flytrap.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}