name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add Rust targets
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache cargo registry + targets
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-universal-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-universal-

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Lipo into universal binary
        run: |
          mkdir -p dist
          lipo -create -output dist/ccft \
            target/aarch64-apple-darwin/release/ccft \
            target/x86_64-apple-darwin/release/ccft
          chmod +x dist/ccft
          file dist/ccft
          cp LICENSE NOTICE README.md dist/

      - name: Tarball
        run: tar -czvf ccft-macos-universal.tar.gz -C dist .

      - name: Create GitHub Release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            dist/ccft \
            ccft-macos-universal.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
